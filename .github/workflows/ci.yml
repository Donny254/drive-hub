name: CI

on:
  push:
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci --omit=dev
      - run: node --check src/index.js
      - run: node --check src/app.js
      - run: bash -lc 'for file in src/*.js src/routes/*.js src/middleware/*.js scripts/*.js; do [ -f "$file" ] && node --check "$file"; done'

  docker-builds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build frontend image
        run: docker build -t drive-hub-web:ci .
      - name: Build backend image
        run: docker build -t drive-hub-api:ci ./server
