services:
  api:
    build:
      context: ./server
    ports:
      - "8080:8080"
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      PORT: 8080

  web:
    build:
      context: .
      args:
        VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "4173:80"
    depends_on:
      - api
